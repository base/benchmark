name: Load test throughput test
description: Test builder throughput using base-load-test binary as transaction generator
payloads:
  - name: Load Test
    type: load-test
    id: load-test
    network: devnet
    config_file: ./load-test-config.yml

benchmarks:
  - variables:
      - type: payload
        value: load-test
      - type: node_type
        value: builder
      - type: validator_node_type
        value: base-reth-node
      - type: num_blocks
        value: 10
      - type: gas_limit
        value: 1000000000
